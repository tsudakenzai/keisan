<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建材かんたん計算</title>
<style>
  :root{
    --ink:#1c2430; --paper:#f3efe6; --line:#d8d0c0;
    --accent:#c2410c; --accent-soft:#fbeee4; --muted:#6b6558; --card:#fffdf8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    padding:20px 12px 48px;
    font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-text-size-adjust:100%;
  }
  .shell{max-width:640px; margin:0 auto;}
  header.app{display:flex; gap:14px; align-items:center; margin-bottom:20px;}
  .logo{width:46px;height:46px;border-radius:12px;background:var(--ink);color:var(--paper);
    display:grid;place-items:center;font-weight:700;font-size:14px;letter-spacing:.5px;flex-shrink:0;}
  .title{font-size:22px;font-weight:800;letter-spacing:-.3px;}
  .sub{font-size:12.5px;color:var(--muted);margin-top:2px;}

  nav.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;background:#eae3d5;padding:5px;border-radius:12px;}
  nav.tabs button{flex:1 1 auto;border:none;background:transparent;cursor:pointer;padding:9px 8px;
    border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted);white-space:nowrap;font-family:inherit;}
  nav.tabs button.active{background:var(--paper);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  nav.tabs button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;}
  h2{font-size:16px;font-weight:800;margin:0 0 16px;letter-spacing:-.2px;}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
  @media(max-width:420px){.grid3{grid-template-columns:1fr 1fr;}}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
  .field-label{font-size:12.5px;font-weight:600;color:#4b4638;}
  .input-wrap{position:relative;display:flex;align-items:center;}
  .input-wrap input, .input-wrap select{
    width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;
    background:#fff;color:var(--ink);font-family:inherit;
  }
  .input-wrap input:focus, .input-wrap select:focus{outline:2px solid var(--accent);outline-offset:0;border-color:var(--accent);}
  .input-wrap .unit{position:absolute;right:12px;font-size:12px;color:#9a9382;pointer-events:none;font-weight:600;}
  select.full{width:100%;}

  .check{display:flex;flex-direction:row;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer;}

  /* 横ブロックの段 指定 */
  .yk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(122px,1fr));gap:5px;
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px;}
  .yk-item{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;
    padding:4px 6px;border-radius:6px;}
  .yk-item:hover{background:var(--accent-soft);}
  .yk-item input{width:15px;height:15px;accent-color:var(--accent);flex-shrink:0;}
  .yk-item.yk-dim{opacity:.5;cursor:not-allowed;}
  .yk-item.yk-dim:hover{background:transparent;}
  .check input{width:18px;height:18px;accent-color:var(--accent);}

  .result{margin-top:18px;background:var(--accent-soft);border-radius:12px;padding:6px 14px;border:1px solid var(--line);}
  .result-row{display:flex;justify-content:space-between;align-items:baseline;padding:11px 0;border-bottom:1px dashed var(--line);}
  .result-row:last-of-type{border-bottom:none;}
  .result-label{font-size:13px;color:#4b4638;font-weight:600;}
  .result-value{font-size:15px;}
  .result-value b{font-size:18px;}
  .result-unit{font-size:12px;color:var(--muted);margin-left:4px;font-weight:600;}
  .note{font-size:11.5px;color:#7a7364;line-height:1.6;margin:10px 2px 8px;}
  .note.warn{background:#fff4e6;border:1px solid #e8b978;border-radius:8px;padding:8px 10px;color:#8a5a1a;font-weight:600;}

  /* 製品スペック表示 */
  .spec{background:#f6f2e8;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px;}
  .spec-row{display:flex;gap:10px;font-size:11.5px;line-height:1.7;color:#4b4638;}
  .spec-row b{flex:0 0 62px;color:#6b6558;font-weight:700;}
  .spec-row span{flex:1;}
  .maker-link{color:var(--accent);font-weight:700;text-decoration:none;border-bottom:1px solid rgba(194,65,12,.35);}
  .maker-link:hover{border-bottom-color:var(--accent);}

  /* 但し書き（重要） */
  .disclaimer{background:#fff4e6;border:1px solid #e8b978;border-radius:9px;padding:8px 12px;margin-bottom:14px;}
  .disclaimer p{margin:0;font-size:11.5px;line-height:1.6;color:#8a5a1a;}
  .disclaimer b{color:#7a4a10;font-weight:700;}

  /* 施工イメージ図 */
  .diagram{margin-top:16px;}
  .diagram-title{font-size:12.5px;font-weight:700;color:#4b4638;margin:0 0 8px;}
  .diagram-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;background:#fff;padding:12px;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:11.5px;color:#4b4638;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:13px;height:13px;border-radius:3px;display:inline-block;border:1px solid rgba(0,0,0,.15);}

  footer.app{font-size:11px;color:#9a9382;text-align:center;margin-top:20px;line-height:1.6;}

  header.app .head-txt{flex:1;}
  .print-btn{border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;
    padding:9px 14px;border-radius:9px;font-size:12.5px;font-weight:700;font-family:inherit;white-space:nowrap;}
  .print-btn:hover{background:var(--accent-soft);border-color:var(--accent);}
  .print-foot{display:none;}

  /* ===== 印刷プレビュー（画面表示・A4比率） ===== */
  .pv-mask{display:none; position:fixed; inset:0; background:#5c5850; z-index:9999;
    flex-direction:column;}
  .pv-mask.show{display:flex;}
  .pv-bar{display:flex; align-items:center; gap:8px; padding:9px 12px; background:var(--ink);
    color:var(--paper); flex-shrink:0;}
  .pv-ttl{font-size:13px; font-weight:700;}
  .pv-sp{flex:1;}
  .pv-b{border:none; border-radius:8px; padding:9px 13px; font-size:12.5px; font-weight:700;
    font-family:inherit; cursor:pointer; background:var(--accent); color:#fff; white-space:nowrap;}
  .pv-b.pv-x{background:#6b6558;}
  .pv-b:hover{opacity:.85;}
  .pv-tip{margin:0; padding:7px 12px; background:#fff4e6; color:#8a5a1a; font-size:11px;
    line-height:1.55; flex-shrink:0; border-bottom:1px solid #e8b978;}
  .pv-scroll{flex:1; overflow:auto; padding:14px; -webkit-overflow-scrolling:touch;}

  /* A4 の紙（210×297mm）を実寸で再現 */
  .pv-paper{width:210mm; min-height:297mm; margin:0 auto; background:#fff;
    padding:8mm; box-sizing:border-box; box-shadow:0 3px 16px rgba(0,0,0,.4);
    color:var(--ink); font-size:8.5pt;}
  .pv-fit{margin:0 auto;}
  /* 画面が狭いときは紙ごと縮小して全体を見せる */
  @media(max-width:840px){
    .pv-scroll{padding:8px;}
    .pv-paper{transform:scale(var(--pv-sc,1)); transform-origin:top left;}
  }

  /* 紙の中身のスタイル（印刷時と同じ見た目） */
  .pv-paper .pv-head{display:flex; gap:8px; align-items:center; padding-bottom:4px;
    border-bottom:1.5px solid var(--ink); margin-bottom:6px;}
  .pv-paper .pv-logo{width:24px;height:24px;border-radius:6px;background:var(--ink);color:#fff;
    display:grid;place-items:center;font-size:7pt;font-weight:700;flex-shrink:0;}
  .pv-paper .pv-h1{font-size:13pt;font-weight:800;letter-spacing:-.3px;}
  .pv-paper .pv-h2{font-size:7.5pt;color:var(--muted);}
  .pv-paper .disclaimer{margin-bottom:5px; padding:4px 8px; border-radius:5px;}
  .pv-paper .disclaimer p{font-size:7.5pt; line-height:1.4;}
  .pv-paper .card{border:1px solid #999; border-radius:6px; padding:7px 9px; background:#fff;}
  .pv-paper h2{font-size:10.5pt; margin:0 0 6px;}
  .pv-paper .field{margin-bottom:4px; gap:2px;}
  .pv-paper .field-label{font-size:7pt;}
  .pv-paper .input-wrap input, .pv-paper .input-wrap select{
    padding:3px 5px; font-size:8.5pt; border:1px solid #aaa; border-radius:4px; background:#fff;}
  .pv-paper .input-wrap .unit{font-size:6.5pt; right:6px;}
  .pv-paper .grid2, .pv-paper .grid3{gap:5px; margin-bottom:4px;}
  .pv-paper .yk-grid{gap:2px; padding:4px; grid-template-columns:repeat(auto-fill,minmax(88px,1fr));}
  .pv-paper .yk-item{font-size:7pt; padding:1px 3px; gap:4px;}
  .pv-paper .yk-item input{width:10px;height:10px;}
  .pv-paper .spec{padding:4px 7px; margin-bottom:5px; border-radius:5px;}
  .pv-paper .spec-row{font-size:7pt; line-height:1.4;}
  .pv-paper .spec-row b{flex:0 0 46px;}
  .pv-paper .result{margin-top:6px; padding:2px 8px; border-radius:5px; border:1px solid #8a7a5a;}
  .pv-paper .result-row{padding:3px 0;}
  .pv-paper .result-label{font-size:7.5pt;}
  .pv-paper .result-value{font-size:8pt;}
  .pv-paper .result-value b{font-size:10pt;}
  .pv-paper .note{font-size:6.5pt; line-height:1.4; margin:4px 1px 3px;}
  .pv-paper .diagram{margin-top:6px;}
  .pv-paper .diagram-title{font-size:7.5pt; margin:0 0 3px;}
  .pv-paper .diagram-wrap{padding:5px; border-radius:5px; overflow:visible;}
  .pv-paper .diagram-wrap svg{max-width:100%; max-height:70mm; height:auto; width:auto;
    display:block; margin:0 auto;}
  .pv-paper .legend{font-size:6.5pt; gap:8px; margin-top:4px;}
  .pv-paper .legend i{width:9px;height:9px;}
  .pv-paper .pv-foot{display:flex; justify-content:space-between; margin-top:6px;
    padding-top:4px; border-top:1px solid #ccc; font-size:7pt; color:#666;}


/* ============ A4 印刷用（1枚に収める） ============ */
@media print{
  @page{ size:A4 portrait; margin:8mm; }

  html,body{
    background:#fff !important; padding:0 !important; margin:0 !important;
    min-height:auto !important; height:auto !important;
    font-size:8.5pt; -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  .shell{max-width:100%;}

  /* 画面専用は隠す */
  .print-btn, nav.tabs{display:none !important;}
  .pv-bar, .pv-tip{display:none !important;}

  /* プレビューを開いたまま印刷したら、A4の紙だけを印刷する */
  .pv-mask.show{position:static !important; display:block !important; background:#fff !important;}
  .pv-mask.show .pv-scroll{overflow:visible !important; padding:0 !important; height:auto !important;}
  .pv-mask.show .pv-fit{width:auto !important; height:auto !important; margin:0 !important;}
  .pv-mask.show .pv-paper{
    width:auto !important; min-height:auto !important; margin:0 !important; padding:0 !important;
    box-shadow:none !important; transform:none !important;
  }
  /* プレビュー中は元のページ本体を隠す */
  body.pv-open .shell{display:none !important;}

  /* ヘッダー：1行に圧縮 */
  header.app{margin-bottom:4px; padding-bottom:3px; border-bottom:1.5px solid var(--ink); gap:7px;}
  .logo{width:22px;height:22px;border-radius:5px;font-size:7pt;}
  .title{font-size:12pt;}
  .sub{font-size:6.5pt;}

  /* 注意書き */
  .disclaimer{margin-bottom:4px; padding:3px 7px; border:1px solid #b0894a !important;
    background:#fdf6ec !important; border-radius:5px; break-inside:avoid;}
  .disclaimer p{font-size:7pt; line-height:1.35;}

  /* カード */
  .card{border:1px solid #999 !important; box-shadow:none !important; padding:6px 8px;
    background:#fff !important; border-radius:6px;}
  h2{font-size:10pt; margin:0 0 5px;}

  /* 入力欄：ぎゅっと */
  .field{margin-bottom:3px; gap:1px;}
  .field-label{font-size:6.5pt;}
  .input-wrap input, .input-wrap select{
    padding:2px 4px; font-size:8pt; border:1px solid #aaa !important; background:#fff !important;
    border-radius:4px; -webkit-appearance:none; appearance:none;
  }
  .input-wrap .unit{font-size:6pt; right:5px;}
  .grid2, .grid3{gap:4px; margin-bottom:3px;}

  /* 横ブロックの段 */
  .yk-grid{gap:1px; padding:3px; border-radius:5px; grid-template-columns:repeat(auto-fill,minmax(84px,1fr));}
  .yk-item{font-size:6.5pt; padding:1px 2px; gap:3px;}
  .yk-item input{width:9px;height:9px;}

  /* 製品スペック */
  .spec{background:#f5f5f5 !important; border:1px solid #bbb !important; padding:3px 6px;
    margin-bottom:4px; border-radius:5px; break-inside:avoid;}
  .spec-row{font-size:6.5pt; line-height:1.3;}
  .spec-row b{flex:0 0 44px;}
  .maker-link{color:#333 !important; border:none !important;}

  /* 計算結果 */
  .result{background:#f7f2e8 !important; border:1px solid #8a7a5a !important; margin-top:5px;
    padding:1px 7px; border-radius:5px; break-inside:avoid;}
  .result-row{padding:2px 0;}
  .result-label{font-size:7pt;}
  .result-value{font-size:7.5pt;}
  .result-value b{font-size:9.5pt;}
  .note{font-size:6pt; line-height:1.3; color:#555 !important; margin:4px 1px 3px;}
  .note.warn{background:#f7ecd9 !important; border:1px solid #b0894a !important;
    color:#6a4a10 !important; padding:3px 5px; font-size:6pt;}

  /* 施工イメージ図：高さを抑えて1枚に収める */
  .diagram{margin-top:5px; break-inside:avoid; page-break-inside:avoid;}
  .diagram-title{font-size:7pt; margin:0 0 3px;}
  .diagram-wrap{overflow:visible !important; border:1px solid #999 !important; padding:4px;
    background:#fff !important; border-radius:5px; break-inside:avoid;}
  .diagram-wrap svg{
    max-width:100% !important;
    max-height:62mm !important;   /* 図が縦に伸びても1枚に収まるよう上限 */
    height:auto !important; width:auto !important; display:block; margin:0 auto;
  }
  .legend{font-size:6pt; gap:7px; margin-top:3px;}
  .legend i{width:8px;height:8px;}

  /* 日付欄 */
  .print-foot{display:flex !important; margin-top:4px; padding-top:3px;
    border-top:1px solid #ccc; font-size:6.5pt; color:#666; justify-content:space-between;}

  footer.app{font-size:6pt; margin-top:3px; color:#666 !important; line-height:1.3;}
}
</style>
</head>
<body>
<div class="shell">
  <header class="app">
    <div class="logo">calc</div>
    <div class="head-txt">
      <div class="title">建材かんたん計算</div>
      <div class="sub">面積・厚み・寸法から必要数量の目安を出します</div>
    </div>
    <button class="print-btn" id="printBtn" type="button">🖨 印刷</button>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <div class="disclaimer">
    <p><b>⚠ 数量はあくまで目安です。</b>発注・施工前に必ずメーカーの施工要領書をご確認ください。</p>
  </div>

  <main id="main"></main>

  <div class="print-foot" id="printFoot"></div>

  <!-- 印刷プレビュー -->
  <div class="pv-mask" id="pvMask">
    <div class="pv-bar">
      <span class="pv-ttl" id="pvTtl">印刷プレビュー（A4）</span>
      <span class="pv-sp"></span>
      <button class="pv-b" id="pvPdf" type="button">📄 PDFで保存</button>
      <button class="pv-b" id="pvPrint" type="button">🖨 印刷</button>
      <button class="pv-b pv-x" id="pvClose" type="button">閉じる</button>
    </div>
    <p class="pv-tip" id="pvTip"></p>
    <div class="pv-scroll"><div class="pv-fit" id="pvFit"><div class="pv-paper" id="pvPaper"></div></div></div>
  </div>

  <footer class="app">
    数値はメーカーカタログに基づく目安です。発注・施工前に必ずメーカーの施工要領書をご確認ください。
  </footer>
</div>

<script>
/* =====================================================================
   ヘルパー
===================================================================== */
const $ = (sel, root=document) => root.querySelector(sel);
const fmt = (n, d=1) => (!isFinite(n) ? "-" :
  n.toLocaleString("ja-JP", {minimumFractionDigits:0, maximumFractionDigits:d}));
const ceilN = (n) => (isFinite(n) ? Math.ceil(n) : 0);
const num = (id) => parseFloat($("#"+id)?.value) || 0;

/* シート敷き詰めの枚数計算
   長さ L を シート長さ s・重ね代 ov で覆うのに必要な枚数。
   端（外周）には重ね代が不要なので、1枚目は全長を使い、
   2枚目以降は (s - ov) ずつ進む。
     枚数 = 1 + ceil((L - s) / (s - ov))
*/
function sheetsAlong(L, s, ov){
  if(!(L>0) || !(s>0)) return 0;
  if(L <= s) return 1;              // 1枚で足りる
  const step = s - ov;
  if(step <= 0) return Infinity;    // 重ね代がシート寸法以上なら不可
  return 1 + Math.ceil((L - s) / step);
}

/* 切り上げない「実数の枚数」
   端の半端な列・段は1枚まるごとではなく、切った一部で足りる。
   その端材は他の半端な箇所へ回すため、切り上げずに実数で数える。
     枚数(実数) = 1 + (L - s) / (s - ov)
*/
function exactAlong(L, s, ov){
  if(!(L>0) || !(s>0)) return 0;
  if(L <= s) return L / s;          // 1枚未満で足りる分はその割合
  const step = s - ov;
  if(step <= 0) return Infinity;
  return 1 + (L - s) / step;
}

/* UI パーツ生成 */
function field(id, label, unit, placeholder, value, step){
  return `<label class="field">
    <span class="field-label">${label}</span>
    <span class="input-wrap">
      <input id="${id}" type="number" inputmode="decimal" min="0"
        ${step!=null?`step="${step}"`:""}
        ${value!=null?`value="${value}"`:""} ${placeholder!=null?`placeholder="${placeholder}"`:""}>
      ${unit?`<span class="unit">${unit}</span>`:""}
    </span>
  </label>`;
}
function select(id, label, options, selected){
  return `<label class="field">
    <span class="field-label">${label}</span>
    <span class="input-wrap">
      <select id="${id}" class="full">
        ${options.map(o=>`<option value="${o.v}" ${o.v===selected?"selected":""}>${o.t}</option>`).join("")}
      </select>
    </span>
  </label>`;
}
function loss(id, def="0"){ return field(id,"ロス率（割増）","%",null,def); }
function resultBox(rows, note){
  return `<div class="result">
    ${rows.map(r=>`<div class="result-row">
      <span class="result-label">${r.label}</span>
      <span class="result-value"><b>${r.value}</b>${r.unit?`<span class="result-unit">${r.unit}</span>`:""}</span>
    </div>`).join("")}
    ${note?`<p class="note">${note}</p>`:""}
  </div>`;
}

/* ブロック施工イメージ図（平面グリッド・SVG）
   rows:総段数 cols:総列数 yokoRows:横筋ブロックの段(Set)
   vCols:たて筋を立てる列(Set) 色分け: 並=薄グレー / 横=オレンジ / 角=濃紺 */
const CB_COLORS = {nami:"#d8d0c0", yoko:"#e08a3c", kado:"#3b4a63", line:"#b8ae9c", steel:"#33404f"};
function blockDiagram(rows, cols, yokoRows, vCols, kadoCols, aspect, embedRatio){
  if(rows<=0 || cols<=0) return "";
  vCols = vCols || new Set();
  kadoCols = kadoCols || new Set([0, cols-1]);
  aspect = (aspect && aspect>0) ? aspect : (390/190); // 幅/高さ（目地込み）。既定は標準ブロック
  embedRatio = embedRatio || 0;                       // 壁高さに対する地中埋込みの割合
  const maxW = 560;
  // 横幅から1個の幅を決め、高さは実際の縦横比で算出
  const cellW = Math.max(10, Math.min(46, Math.floor(maxW / cols)));
  const cellH = Math.max(6, Math.round(cellW / aspect));
  const gap = Math.max(1, Math.floor(cellW*0.05));
  const w = cols*(cellW+gap)+gap;
  const wallH = rows*(cellH+gap)+gap;                 // 壁部分の高さ
  const embedPx = Math.round(wallH*embedRatio);       // 地中部分の高さ
  const h = wallH + embedPx;                          // 図全体の高さ
  const classify = (r,c) => {
    if(kadoCols.has(c)) return "kado";        // 角ライン（両端＋出隅）は全段「角」
    if(yokoRows.has(r)) return "yoko";        // 角以外の横筋段は「横」
    return "nami";                            // 残りは「並」
  };
  const cellXY = (r,c) => ({ x: gap + c*(cellW+gap), y: gap + (rows-1-r)*(cellH+gap) });
  let cells = "";
  for(let r=0; r<rows; r++){
    for(let c=0; c<cols; c++){
      const kind = classify(r,c);
      const {x,y} = cellXY(r,c);
      cells += `<rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" rx="2"
        fill="${CB_COLORS[kind]}" stroke="${CB_COLORS.line}" stroke-width="0.7"/>`;
    }
  }
  // 地中部分（基礎）の帯
  let ground = "";
  if(embedPx>0){
    ground = `<rect x="0" y="${wallH}" width="${w}" height="${embedPx}" fill="#e8e0cf"/>
      <line x1="0" y1="${wallH}" x2="${w}" y2="${wallH}" stroke="#a89e88" stroke-width="1.2" stroke-dasharray="5 3"/>
      <text x="6" y="${wallH+12}" font-size="9" fill="#7a7364">地中（埋込み）</text>`;
  }
  // 鉄筋の線（たて筋＝縦目地、よこ筋＝横筋段に水平）
  // vCols には「列位置（小数可）」が入る。X = 左端 + 位置×(1列の幅)
  let steel = "";
  const colPitch = cellW + gap;                   // 図上の1列の幅
  for(const pos of vCols){
    if(pos<0 || pos>cols) continue;
    // 位置posの縦目地（ブロック左辺）にほぼ一致するX。0は右隣の目地へ寄せる。
    let cx = gap + pos*colPitch;
    if(pos<=0) cx = gap + colPitch;               // 左端は最初の目地へ
    if(pos>=cols) cx = gap + cols*colPitch;
    cx = Math.min(Math.max(cx, gap+2), w-gap-2);
    // 天端から地中の埋込み下端まで通す
    steel += `<line x1="${cx}" y1="${gap}" x2="${cx}" y2="${h-2}"
      stroke="${CB_COLORS.steel}" stroke-width="1.6" stroke-linecap="round" opacity="0.75"/>`;
  }
  for(const r of yokoRows){
    const y = gap + (rows-1-r)*(cellH+gap) + cellH/2;
    steel += `<line x1="${gap}" y1="${y}" x2="${w-gap}" y2="${y}"
      stroke="${CB_COLORS.steel}" stroke-width="1.4" stroke-dasharray="3 2" opacity="0.65"/>`;
  }
  const dw = Math.min(w, maxW);
  return `<div class="diagram">
    <p class="diagram-title">施工イメージ図（${rows}段 × ${cols}列 ／ 上が天端）</p>
    <div class="diagram-wrap">
      <svg viewBox="0 0 ${w} ${h}" width="${dw}" height="${h*dw/w}"
           xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ブロック配置図">
        <rect width="${w}" height="${h}" fill="#fff"/>
        ${ground}
        ${cells}
        ${steel}
      </svg>
      <div class="legend">
        <span><i style="background:${CB_COLORS.nami}"></i>並ブロック</span>
        <span><i style="background:${CB_COLORS.yoko}"></i>横ブロック</span>
        <span><i style="background:${CB_COLORS.kado}"></i>角ブロック</span>
        <span><i style="background:${CB_COLORS.steel}"></i>鉄筋</span>
      </div>
    </div>
  </div>`;
}

/* ---- 図の共通枠 ---- */
const DCOL = {fill:"#e08a3c", fill2:"#d8d0c0", line:"#b8ae9c", ink:"#3b4a63", base:"#efe9dc", steel:"#5a6b82"};
function diagramWrap(title, inner, legend){
  return `<div class="diagram">
    <p class="diagram-title">${title}</p>
    <div class="diagram-wrap">
      ${inner}
      ${legend?`<div class="legend">${legend}</div>`:""}
    </div>
  </div>`;
}
function svgTag(w, h, inner, maxW=560){
  const dw = Math.min(w, maxW);
  return `<svg viewBox="0 0 ${w} ${h}" width="${dw}" height="${h*dw/w}"
    xmlns="http://www.w3.org/2000/svg" role="img" aria-label="施工イメージ図">${inner}</svg>`;
}

/* ---- 境界・縁石：横一列の並べ図 ---- */
function linearDiagram(count, unitLen){
  if(!(count>0)) return "";
  const n=Math.min(count,30);
  const maxW=560, gap=3, seg=Math.max(10,Math.min(60,Math.floor((maxW-gap*(n+1))/n)));
  const w=n*(seg+gap)+gap, h=54;
  let cells="";
  for(let i=0;i<n;i++){
    const x=gap+i*(seg+gap);
    cells+=`<rect x="${x}" y="12" width="${seg}" height="30" rx="2" fill="${DCOL.fill2}" stroke="${DCOL.line}"/>`;
  }
  const more = count>n ? ` ほか（全${fmt(count,0)}本）` : "";
  return diagramWrap(`並べイメージ（1本${fmt(unitLen*1000,0)}mm）${more}`,
    svgTag(w, h, `<rect width="${w}" height="${h}" fill="#fff"/>${cells}`),
    `<span><i style="background:${DCOL.fill2}"></i>製品1本</span>`
  );
}

/* ---- 左官材：塗り厚の断面図 ---- */
function sectionDiagram(thick){
  if(!(thick>0)) return "";
  const w=560, h=150, baseY=95;
  // 塗り厚を視覚化（誇張スケール）。厚みに応じて塗り層の高さを変える
  const layer = Math.max(6, Math.min(48, thick*2));
  return diagramWrap(`塗り厚 断面イメージ（塗り厚 ${fmt(thick,0)}mm）`,
    svgTag(w, h, `
      <rect x="0" y="0" width="${w}" height="${h}" fill="#fff"/>
      <!-- 下地 -->
      <rect x="40" y="${baseY}" width="${w-80}" height="30" fill="${DCOL.base}" stroke="${DCOL.line}"/>
      <text x="${w/2}" y="${baseY+20}" font-size="12" fill="${DCOL.ink}" text-anchor="middle">下地</text>
      <!-- 塗り層 -->
      <rect x="40" y="${baseY-layer}" width="${w-80}" height="${layer}" fill="${DCOL.fill}" stroke="${DCOL.line}"/>
      <text x="${w/2}" y="${baseY-layer/2+4}" font-size="12" fill="#fff" text-anchor="middle">塗り材 ${fmt(thick,0)}mm</text>
      <!-- 寸法矢印 -->
      <line x1="${w-56}" y1="${baseY-layer}" x2="${w-56}" y2="${baseY}" stroke="${DCOL.ink}" stroke-width="1"/>
      <polygon points="${w-59},${baseY-layer+2} ${w-53},${baseY-layer+2} ${w-56},${baseY-layer}" fill="${DCOL.ink}"/>
      <polygon points="${w-59},${baseY-2} ${w-53},${baseY-2} ${w-56},${baseY}" fill="${DCOL.ink}"/>
    `),
    `<span><i style="background:${DCOL.fill}"></i>塗り材</span><span><i style="background:${DCOL.base}"></i>下地</span>`
  );
}

/* ---- シート/平板の割付図（面積を W×L の枚で敷き詰める） ---- */
function sheetDiagram(sheetW, sheetL, count, unitLabel){
  if(!(sheetW>0)||!(sheetL>0)||!(count>0)) return "";
  // 描画は最大 cols×rows でおおよその割付を表現（実配置の目安）
  const aspect = sheetL/sheetW;
  let cols = Math.max(1, Math.round(Math.sqrt(count/aspect)));
  let rows = Math.ceil(count/cols);
  cols = Math.min(cols, 20); rows = Math.min(rows, 14); // 上限
  const maxW=560, cw=Math.max(14, Math.min(70, Math.floor(maxW/cols)));
  const ch=Math.max(10, Math.min(70, Math.floor(cw*aspect)));
  const gap=2, w=cols*(cw+gap)+gap, h=rows*(ch+gap)+gap;
  let drawn=0, cells="";
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(drawn>=count) break;
    const x=gap+c*(cw+gap), y=gap+r*(ch+gap);
    cells+=`<rect x="${x}" y="${y}" width="${cw}" height="${ch}" rx="2" fill="${DCOL.fill2}" stroke="${DCOL.line}" stroke-width="0.8"/>`;
    drawn++;
  }
  return diagramWrap(`割付イメージ（${unitLabel||"枚"}を敷き詰めた例・目安）`,
    svgTag(w, h, `<rect width="${w}" height="${h}" fill="#fff"/>${cells}`),
    `<span><i style="background:${DCOL.fill2}"></i>1${unitLabel||"枚"}（${fmt(sheetW,2)}×${fmt(sheetL,2)}m）</span>`
  );
}

/* ---- シート割付図（重ね代を色付きで表示） ----
   W,L: 施工寸法(m) / sw,sl: シート寸法(m) / ov: 重ね代(m)
   cols,rows: 横・縦の枚数。シートを実位置に描き、重なり部分を濃色で示す。 */
function layoutDiagram(W, L, sw, sl, ov, cols, rows){
  if(!(W>0)||!(L>0)||!(sw>0)||!(sl>0)||!(cols>0)||!(rows>0)) return "";
  if(!isFinite(cols)||!isFinite(rows)) return "";
  if(cols*rows > 400) return "";                 // 多すぎる場合は描画しない
  const stepX = sw - ov, stepY = sl - ov;        // 2枚目以降のずらし幅
  const coverW = sw + (cols-1)*stepX;            // 実際に覆う寸法
  const coverL = sl + (rows-1)*stepY;
  const maxW = 560, maxH = 420;
  const scale = Math.min(maxW/Math.max(coverW,W), maxH/Math.max(coverL,L));
  const pad = 26;
  const w = Math.max(coverW,W)*scale + pad*2;
  const h = Math.max(coverL,L)*scale + pad*2;
  const OVC = "#e08a3c";      // 重ね部分の色
  const SHC = "rgba(180,196,220,0.55)"; // シート本体（半透明で重なりが濃く見える）
  const LNC = "#5a6b82";

  let sheets = "";
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x = pad + c*stepX*scale;
      const y = pad + r*stepY*scale;
      sheets += `<rect x="${x}" y="${y}" width="${sw*scale}" height="${sl*scale}"
        fill="${SHC}" stroke="${LNC}" stroke-width="0.8"/>`;
    }
  }
  // 重ね代の帯（縦の重なり＝列と列の間、横の重なり＝段と段の間）
  let laps = "";
  if(ov>0){
    for(let c=1;c<cols;c++){
      const x = pad + c*stepX*scale;
      laps += `<rect x="${x}" y="${pad}" width="${ov*scale}" height="${coverL*scale}"
        fill="${OVC}" opacity="0.75"/>`;
    }
    for(let r=1;r<rows;r++){
      const y = pad + r*stepY*scale;
      laps += `<rect x="${pad}" y="${y}" width="${coverW*scale}" height="${ov*scale}"
        fill="${OVC}" opacity="0.75"/>`;
    }
  }
  // 施工範囲の枠（点線）
  const area = `<rect x="${pad}" y="${pad}" width="${W*scale}" height="${L*scale}"
    fill="none" stroke="#c2410c" stroke-width="1.6" stroke-dasharray="6 4"/>`;
  // 寸法ラベル
  const labels = `
    <text x="${pad + W*scale/2}" y="${pad-8}" font-size="11" fill="#4b4638" text-anchor="middle">横 ${fmt(W,2)}m（${fmt(cols,0)}枚）</text>
    <text x="${pad-8}" y="${pad + L*scale/2}" font-size="11" fill="#4b4638" text-anchor="middle"
      transform="rotate(-90 ${pad-8} ${pad + L*scale/2})">縦 ${fmt(L,2)}m（${fmt(rows,0)}枚）</text>`;

  const legend = ov>0
    ? `<span><i style="background:${SHC}"></i>シート</span>
       <span><i style="background:${OVC}"></i>重ね代 ${fmt(ov*1000,0)}mm</span>
       <span><i style="background:#fff;border:1.5px dashed #c2410c !important"></i>施工範囲</span>`
    : `<span><i style="background:${SHC}"></i>シート（重ね代なし）</span>
       <span><i style="background:#fff;border:1.5px dashed #c2410c !important"></i>施工範囲</span>`;

  return diagramWrap(
    `割付イメージ（横${fmt(cols,0)}枚 × 縦${fmt(rows,0)}枚 ／ 赤枠が施工範囲。はみ出す部分は切って端材を他へ回します）`,
    svgTag(w, h, `<rect width="${w}" height="${h}" fill="#fff"/>${sheets}${laps}${area}${labels}`),
    legend
  );
}

/* ---- 鉄筋：格子配筋図 ---- */
function rebarDiagram(barsH, barsV){
  if(!(barsH>0)||!(barsV>0)) return "";
  const bh=Math.min(barsH,40), bv=Math.min(barsV,40);
  const w=560, h=Math.round(w*0.55), pad=18;
  const iw=w-pad*2, ih=h-pad*2;
  let lines="";
  // 横筋（水平線）barsH本
  for(let i=0;i<bh;i++){
    const y=pad+(bh===1?ih/2:ih*i/(bh-1));
    lines+=`<line x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" stroke="${DCOL.steel}" stroke-width="2"/>`;
  }
  // 縦筋（垂直線）barsV本
  for(let j=0;j<bv;j++){
    const x=pad+(bv===1?iw/2:iw*j/(bv-1));
    lines+=`<line x1="${x}" y1="${pad}" x2="${x}" y2="${h-pad}" stroke="${DCOL.steel}" stroke-width="2"/>`;
  }
  return diagramWrap(`配筋イメージ（横筋 ${fmt(barsH,0)}本 × 縦筋 ${fmt(barsV,0)}本）`,
    svgTag(w, h, `<rect width="${w}" height="${h}" fill="#fff"/>
      <rect x="${pad-4}" y="${pad-4}" width="${iw+8}" height="${ih+8}" fill="none" stroke="${DCOL.line}" stroke-dasharray="4 3"/>
      ${lines}`),
    `<span><i style="background:${DCOL.steel}"></i>鉄筋</span>`
  );
}

/* =====================================================================
   0. 生コン・モルタル（現場調合）
   ▼ 換算の基準（一般的な換算値）
     生コン     1m³ … セメント280kg / 砂0.65m³ / 砕石0.65m³
     モルタル1:3 1m³ … セメント480kg / 砂1.05m³
   ▼ 砂・砕石 1袋 ≒ 18.11L（約25kg）／ セメント1袋 25kg
   ▼ 配合比を変えた場合は、材料の見かけ容積の合計を保ったまま比率で按分
===================================================================== */
const BAG_L = 18.11;             // 砂・砕石 1袋の体積(L) ≒25kg
const CEM_BAG = 25;              // セメント1袋(kg)
const CEM_BULK = 480/(1.05/3);   // セメントのかさ密度(kg/m³) ≒1371

// 練上がり1m³をつくるのに必要な「材料の見かけ容積の合計」
const TOT_CONC = 280/CEM_BULK + 0.65 + 0.65;  // 生コン基準 ≒1.504（練上がり1m³に要する見かけ容積）
const TOT_MOR  = (1.05/3) + 1.05;             // モルタル基準 ≒1.400（同上）

// 配合プリセット（c:s:g の容積比）
const MIX_PRESETS = {
  "c123":  {t:"生コン 1:2:3（通常）",           c:1, s:2, g:3},
  "c124":  {t:"生コン 1:2:4（基礎土間・強度重視）", c:1, s:2, g:4},
  "c136":  {t:"生コン 1:3:6（捨てコン）",        c:1, s:3, g:6},
  "m12":   {t:"モルタル 1:2",   c:1, s:2, g:0},
  "m125":  {t:"モルタル 1:2.5", c:1, s:2.5, g:0},
  "m13":   {t:"モルタル 1:3", c:1, s:3, g:0},
  "m14":   {t:"モルタル 1:4",   c:1, s:4, g:0},
  "m15":   {t:"モルタル 1:5",   c:1, s:5, g:0},
  "free":  {t:"▼ 自由入力（配合比を直接指定）",  c:1, s:2, g:3, free:true},
};

// 配合比(c:s:g) → 練上がり1m³あたりの材料量
function mixPerM3(c, s, g){
  if(!(c>0)) return {cement:0, sand:0, gravel:0};
  const total = (g>0) ? TOT_CONC : TOT_MOR;   // 砕石ありは生コン基準、なしはモルタル基準
  const unit = total/(c+s+g);
  const cVol = unit*c, sVol = unit*s, gVol = unit*g;
  return {cement:cVol*CEM_BULK, sand:sVol, gravel:gVol};
}

function renderMix(){
  const opts = Object.entries(MIX_PRESETS).map(([v,m])=>({v,t:m.t}));
  $("#main").innerHTML = `<section class="card">
    <h2>生コン・モルタル（現場調合）</h2>
    ${select("mx_type","配合",opts,"c123")}
    <div id="mx_ratio"></div>
    ${select("mx_imode","入力方法",[
      {v:"vol",  t:"体積（m³）で入力"},
      {v:"area", t:"面積 × 厚みで入力"},
    ],"vol")}
    <div id="mx_in"></div>
    ${loss("mx_loss","0")}
    <div id="mx_out"></div>
  </section>`;

  const calc = () => {
    const key=$("#mx_type").value, preset=MIX_PRESETS[key];
    const l=num("mx_loss")/100;

    // ---- 配合比の入力欄（プリセット選択で値をセット、自由入力なら手で変更）----
    const rw=$("#mx_ratio");
    if(rw && rw.dataset.key!==key){
      rw.dataset.key=key;
      rw.innerHTML = `<div class="field"><span class="field-label">配合比（容積比）　セメント : 砂 : 砕石　※砕石0でモルタル</span>
        <div class="grid3">
          ${field("mx_c","セメント","",null,String(preset.c),"0.1")}
          ${field("mx_s","砂","",null,String(preset.s),"0.1")}
          ${field("mx_g","砕石","",null,String(preset.g),"0.1")}
        </div></div>`;
      bindInputs("#mx_ratio", calc);
    }
    const c=num("mx_c"), sa_=num("mx_s"), g=num("mx_g");

    // ---- 体積の入力欄 ----
    const imode=$("#mx_imode").value;
    const inWrap=$("#mx_in");
    if(inWrap && inWrap.dataset.mode!==imode){
      inWrap.dataset.mode=imode;
      inWrap.innerHTML = imode==="vol"
        ? field("mx_vol","打設・練り上がり体積","m³","1",null,"0.1")
        : `<div class="grid2">${field("mx_area","面積","m²","10",null,"0.1")}${field("mx_thick","厚み","cm","10",null,"0.5")}</div>`;
      bindInputs("#mx_in", calc);
    }
    let vol;
    if(imode==="vol"){ vol=num("mx_vol"); }
    else { vol=num("mx_area")*(num("mx_thick")/100); }
    const v = vol*(1+l);

    const per = mixPerM3(c, sa_, g);
    const cemKg = per.cement*v;
    const sandM3 = per.sand*v;
    const gravM3 = per.gravel*v;
    const r2 = (x)=>Math.round(x*100)/100;   // 表示する体積に丸めてから袋数を算出
    const cemBag = ceilN(cemKg/CEM_BAG);
    const sandBag = ceilN(r2(sandM3)*1000/BAG_L);
    const gravBag = ceilN(r2(gravM3)*1000/BAG_L);

    const isMortar = !(g>0);
    const ratioStr = isMortar ? `1 : ${fmt(sa_/c,2)}` : `1 : ${fmt(sa_/c,2)} : ${fmt(g/c,2)}`;

    const rows=[
      {label:"練り上がり体積", value:fmt(v,2), unit:"m³"},
      {label:"配合比（容積）", value:ratioStr, unit:""},
      {label:"セメント", value:`${fmt(cemKg,0)}kg ／ ${fmt(cemBag,0)}袋`, unit:"(25kg)"},
      {label:"砂", value:`${fmt(sandM3,2)}m³ ／ ${fmt(sandBag,0)}袋`, unit:"(約25kg)"},
    ];
    if(g>0) rows.push({label:"砕石", value:`${fmt(gravM3,2)}m³ ／ ${fmt(gravBag,0)}袋`, unit:"(約25kg)"});
    if(imode==="area") rows.push({label:"面積 × 厚み", value:`${fmt(num("mx_area"),2)}㎡ × ${fmt(num("mx_thick"),1)}cm`, unit:""});

    const warn = !(c>0) ? `<p class="note warn">⚠ セメントの比率に0より大きい数値を入れてください。</p>` : "";
    const note = `配合比は自由に変更できます（プリセットを選んでから数値を直接書き換えてもOK）。`
      + `砕石を0にするとモルタルとして計算します。`
      + `袋数は セメント1袋25kg、砂・砕石1袋 約18L(約25kg) で換算しています。`
      + `材料の見かけ容積の合計を保ったまま、指定の比率で按分して算出しています。`
      + `水量は骨材の含水・現場状況で変わるため含めていません。`;

    $("#mx_out").innerHTML = warn + resultBox(rows, note) + mixDiagram(per);
  };
  $("#mx_type").addEventListener("change", calc);
  bindInputs("#main", calc);
  calc();
}

/* ---- 配合の割合を帯グラフで表示 ---- */
function mixDiagram(per){
  const cVol = per.cement/CEM_BULK, sVol = per.sand, gVol = per.gravel;
  const tot = cVol+sVol+gVol;
  if(!(tot>0)) return "";
  const w=560, h=76, barY=22, barH=30, pad=10;
  const bw=w-pad*2;
  const parts=[
    {n:"セメント", v:cVol, c:"#6b7a8f"},
    {n:"砂",       v:sVol, c:"#d8c9a3"},
  ];
  if(gVol>0) parts.push({n:"砕石", v:gVol, c:"#9aa4ae"});
  let x=pad, bars="", labels="";
  for(const p of parts){
    const pw=bw*(p.v/tot);
    bars += `<rect x="${x}" y="${barY}" width="${pw}" height="${barH}" fill="${p.c}" stroke="#7a7364" stroke-width="0.6"/>`;
    if(pw>44) labels += `<text x="${x+pw/2}" y="${barY+barH/2+4}" font-size="11" fill="#2b2b2b" text-anchor="middle">${p.n} ${Math.round(p.v/tot*100)}%</text>`;
    x+=pw;
  }
  const legend = parts.map(p=>`<span><i style="background:${p.c}"></i>${p.n}</span>`).join("");
  return diagramWrap(`配合イメージ（容積比）`,
    svgTag(w,h,`<rect width="${w}" height="${h}" fill="#fff"/>
      <text x="${pad}" y="14" font-size="10" fill="#6b6558">練り上がり1m³あたりの容積割合</text>
      ${bars}${labels}`),
    legend);
}

    </div>
    ${loss("p_loss")}
    <div id="p_out"></div>
  </section>`;

  const setMat = () => {
    const m = PLASTER_MATS[$("#p_mat").value];
    $("#p_rate").value = m.kg;
    $("#p_bag").value  = m.bag;
    $("#p_thick").value = m.thick;
    $("#p_info").innerHTML = `<div class="spec">
      <div class="spec-row"><b>用途</b><span>${m.use}</span></div>
      <div class="spec-row"><b>規格</b><span>${m.spec}</span></div>
      <div class="spec-row"><b>標準塗厚</b><span>${m.thickMin}〜${m.thickMax}mm（既定 ${m.thick}mm）</span></div>
      <div class="spec-row"><b>加水量</b><span>${m.water}${m.mix!=="—"?`　／　練上がり ${m.mix}`:""}</span></div>
      <div class="spec-row"><b>メーカー</b><span>${m.maker}　<a class="maker-link" href="${m.url}" target="_blank" rel="noopener">公式サイトで施工要領を確認 ↗</a></span></div>
    </div>`;
  };

  const calc = () => {
    const m = PLASTER_MATS[$("#p_mat").value];
    const l = num("p_loss")/100, b = num("p_bag"), rate = num("p_rate");
    const area = num("p_area"), thick = num("p_thick");
    const totalKg = area*thick*rate*(1+l);
    const bags = b>0 ? totalKg/b : 0;
    // 1袋あたりの施工面積（この塗り厚での）
    const m2PerBag = (rate>0 && thick>0) ? b/(rate*thick) : 0;
    const warn = (thick < m.thickMin || thick > m.thickMax)
      ? `<p class="note warn">⚠ 入力した塗り厚 ${fmt(thick,1)}mm は、この製品の標準塗厚（${m.thickMin}〜${m.thickMax}mm）の範囲外です。カタログの標準範囲でご確認ください。</p>` : "";
    $("#p_out").innerHTML = resultBox([
      {label:"必要数量", value:fmt(ceilN(bags),0), unit:`袋(${fmt(b,0)}kg)`},
      {label:"総重量", value:fmt(totalKg,1), unit:"kg"},
      {label:"1袋あたり施工面積", value:fmt(m2PerBag,2), unit:"m²/袋"},
      {label:"必要な水", value:m.water, unit:""},
    ], `【施工方法】${m.method}<br><br>【注意】${m.caution}<br><br>数量はカタログの標準施工面積から算出しています（${m.spec}）。`)
      + warn
      + sectionDiagram(thick);
  };

  $("#p_mat").addEventListener("change", ()=>{ setMat(); calc(); });
  bindInputs("#main", calc);
  setMat(); calc();
}

/* =====================================================================
   2. ブロック・境界・平板
   fillPerBlock: ブロック1個あたりの空洞充填モルタル量(L)の目安
   （縦筋・横筋を入れる空洞に充填する量。厚みが増すほど多くなる）
===================================================================== */
const CB_TYPES = {
  "8":  {t:"8cm（80mm）",   fillPerBlock:0.8},
  "10": {t:"10cm（100mm）", fillPerBlock:1.0},
  "12": {t:"12cm（120mm）", fillPerBlock:1.3},
  "15": {t:"15cm（150mm）", fillPerBlock:1.7},
};
function renderBlock(){
  $("#main").innerHTML = `<section class="card">
    <h2>コンクリートブロック</h2>
    <div id="b_body"></div>
  </section>`;
  const mode = () => "block";
  const bodies = {
    block: () => `
      ${select("bw_shape","塀の形状",[
        {v:"straight",t:"一直線（出隅なし）"},
        {v:"L",       t:"L字（出隅1か所）"},
        {v:"U",       t:"コの字（出隅2か所）"},
      ],"straight")}
      ${select("bw_type","ブロックの厚み",Object.keys(CB_TYPES).map(k=>({v:k,t:CB_TYPES[k].t})),"10")}
      ${field("bw_w","壁の総延長","m","5",null,"0.1")}
      ${select("bw_hmode","高さの指定方法",[
        {v:"rows",   t:"積む段数で指定"},
        {v:"height", t:"壁の高さ(m)で指定"},
      ],"rows")}
      <div id="bw_hin"></div>
      <div class="grid3">${field("bw_bw","ブロック長さ","mm",null,"390")}${field("bw_bh","ブロック高さ","mm",null,"190")}${field("bw_j","目地","mm",null,"10")}</div>
      <div id="bw_yoko"></div>
      ${select("bw_vspace","たて筋の間隔",[
        {v:"40",      t:"40cmごと（空洞2つに1本）"},
        {v:"80",      t:"80cmごと（空洞4つに1本）"},
      ],"40")}
      <div class="grid2">${field("bw_embed","たて筋の地中埋込み","cm",null,"20")}${loss("bw_loss","0")}</div>
      <div id="bw_out"></div>`,
  };
  const calcs = {
    block: () => {
      const l=num("bw_loss")/100;
      const type=CB_TYPES[$("#bw_type").value];
      const uw=(num("bw_bw")+num("bw_j"))/1000, uh=(num("bw_bh")+num("bw_j"))/1000;

      // ---- 高さの指定方法（段数 or 高さ）を切替 ----
      const hmode=$("#bw_hmode").value;
      const hin=$("#bw_hin");
      if(hin && hin.dataset.mode!==hmode){
        hin.dataset.mode=hmode;
        hin.innerHTML = hmode==="rows"
          ? field("bw_rows","積む段数","段",null,"5","1")
          : field("bw_h","壁の高さ","m","1.8",null,"0.1");
        bindInputs("#bw_hin", calcs.block);
      }
      // 段数と壁高さを相互に算出
      let rows, wallH;
      if(hmode==="rows"){
        rows = Math.max(0, Math.round(num("bw_rows")));
        wallH = rows*uh;                       // 段数 → 実際の壁高さ
      } else {
        wallH = num("bw_h");
        rows = uh>0 ? Math.round(wallH/uh) : 0; // 高さ → 段数
      }

      const wallW=num("bw_w");
      const cols = uw>0 ? Math.round(wallW/uw) : 0;
      const total = rows*cols;

      // ---- 横ブロックの段をチェックボックスで指定 ----
      // 既定: 天端から2段ごと（最下段は基礎に接するので並）
      const yk=$("#bw_yoko");
      const sig = `${rows}`;                    // 段数が変わったら作り直す
      if(yk && yk.dataset.rows!==sig){
        yk.dataset.rows=sig;
        if(rows>0){
          let boxes="";
          for(let i=1;i<=rows;i++){            // i = 上から数えた段数
            const rIdx = rows-i;               // r:0が最下段
            const isBottom = (rIdx===0);
            // 既定: 上から奇数段目(1,3,5…)に横。ただし最下段は並。
            const def = (i%2===1) && !isBottom;
            boxes += `<label class="yk-item${isBottom?" yk-dim":""}">
              <input type="checkbox" class="yk-cb" data-r="${rIdx}" ${def?"checked":""} ${isBottom?"disabled":""}>
              <span>上から${i}段目${isBottom?"（最下段）":""}</span>
            </label>`;
          }
          yk.innerHTML = `<div class="field"><span class="field-label">横ブロックを入れる段（チェックした段が横筋ブロック）</span>
            <div class="yk-grid">${boxes}</div></div>`;
          yk.querySelectorAll(".yk-cb").forEach(cb=>cb.addEventListener("change", calcs.block));
        } else {
          yk.innerHTML="";
        }
      }
      // チェック状態を読む
      const yokoRows = new Set();
      (yk ? yk.querySelectorAll(".yk-cb") : []).forEach(cb=>{
        if(cb.checked && !cb.disabled) yokoRows.add(parseInt(cb.dataset.r,10));
      });
      const hrows = yokoRows.size;

      // ---- 塀の形状 → 角ブロックの縦ライン ----
      const shape = $("#bw_shape").value;
      const corners = shape==="L" ? 1 : (shape==="U" ? 2 : 0);
      const kadoCols = new Set();
      if(cols>=1){ kadoCols.add(0); kadoCols.add(cols-1); }
      if(corners>0 && cols>2){
        for(let i=1; i<=corners; i++){
          const cc = Math.round(cols*i/(corners+1));
          kadoCols.add(Math.min(Math.max(cc,1),cols-2));
        }
      }
      const kadoColCount = kadoCols.size;

      const kado = kadoColCount*rows;
      const yoko = Math.max(hrows*(cols-kadoColCount), 0);
      const nami = Math.max(total - kado - yoko, 0);
      const applyLoss = (n)=>ceilN(n*(1+l));
      const namiL=applyLoss(nami), yokoL=applyLoss(yoko), kadoL=applyLoss(kado);
      const fillL=(namiL+yokoL+kadoL)*type.fillPerBlock;
      const shapeNote = shape==="straight" ? "一直線" : (shape==="L" ? "L字（出隅1）" : "コの字（出隅2）");
      // 積み方を上から順に文字で表現
      let pat=[];
      for(let i=1;i<=Math.min(rows,12);i++){ pat.push(yokoRows.has(rows-i) ? "横" : "並"); }
      const patStr = pat.join("・") + (rows>12 ? "…" : "");

      // ---- 鉄筋量 ----
      const vspace=$("#bw_vspace").value;
      const embedM = num("bw_embed")/100;
      const pitchM = vspace==="40" ? 0.4 : 0.8;
      const vBars = (pitchM>0 && wallW>0) ? Math.floor(wallW/pitchM)+1+corners : 0;
      const vBarLen = wallH + embedM;
      const vLen = vBars * vBarLen;
      const hBars = hrows;
      const hLen = hBars * wallW;
      const vColsArr = [];
      if(vBars>0 && cols>0 && uw>0){
        const stepCols = pitchM/uw;
        const baseBars = Math.max(vBars - corners, 0);
        for(let i=0;i<baseBars;i++) vColsArr.push(Math.min(i*stepCols, cols));
        for(const kc of kadoCols){ if(kc!==0 && kc!==cols-1) vColsArr.push(kc); }
      }

      $("#bw_out").innerHTML = resultBox([
        {label:"総数量", value:fmt(namiL+yokoL+kadoL,0), unit:"個"},
        {label:"　└ 並ブロック", value:fmt(namiL,0), unit:"個"},
        {label:"　└ 横ブロック", value:fmt(yokoL,0), unit:"個"},
        {label:"　└ 角ブロック", value:fmt(kadoL,0), unit:"個"},
        {label:"段数 × 列数", value:`${fmt(rows,0)}段 × ${fmt(cols,0)}列`, unit:""},
        {label:"壁の高さ", value:fmt(wallH,2), unit:"m"},
        {label:"積み方（上から）", value:patStr, unit:""},
        {label:"充填モルタル(目安)", value:fmt(fillL,0), unit:"L"},
        {label:"たて筋", value:`${fmt(vBars,0)}本 ／ 総${fmt(vLen,1)}m`, unit:""},
        {label:"　└ 1本の長さ", value:`${fmt(vBarLen,2)}m（壁${fmt(wallH,2)}＋埋込${fmt(embedM,2)}）`, unit:""},
        {label:"よこ筋", value:`${fmt(hBars,0)}本 ／ 総${fmt(hLen,1)}m`, unit:""},
      ], `${shapeNote}の塀。角ブロック＝両端＋出隅の縦ライン（計${kadoColCount}ライン×全段）、横ブロック＝チェックした段の中間部、残りが並。`
        + `ブロック1個＝${fmt(num("bw_bw"),0)}×${fmt(num("bw_bh"),0)}mm＋目地${fmt(num("bw_j"),0)}mm。`
        + `充填約${type.fillPerBlock}L/個（全充填目安）。たて筋は${vspace}cmごと＋出隅分で${fmt(vBars,0)}本、1本＝壁高さ＋地中埋込み${fmt(num("bw_embed"),0)}cm。`
        + `よこ筋は横筋段ごとに壁幅1本。総延長は塀を一直線に展開した長さ。重ね継手は別途。`)
        + blockDiagram(rows, cols, yokoRows, vColsArr, kadoCols, uw/uh, wallH>0 ? embedM/wallH : 0);
    },
  };
  const swap = () => { const m=mode(); $("#b_body").innerHTML=bodies[m](); bindInputs("#b_body",calcs[m]); calcs[m](); };
  swap();
}

/* =====================================================================
   3. メッシュ・鉄筋・ラス
===================================================================== */
const WEIGHT = {D10:0.56, D13:0.995, D16:1.56, D19:2.25, D22:3.04};
// ワイヤーメッシュの規格（線径・シート寸法・重ね代mm）
// 重ね代 = 網目ピッチ + 端の出寸法
//   φ3.2 1.0×2.0m : 100 + 50 = 150mm
//   φ5.0 1.0×2.0m : 150 + 50 = 200mm
//   φ6   1.0×2.0m : 150 + 50 = 200mm
//   φ6   1.5×3.0m : 150 + 75 = 225mm
const MESH_SPECS = {
  m32:   {t:"φ3.2mm　1m×2m",   w:1.0, l:2.0, ov:150},
  m50:   {t:"φ5.0mm　1m×2m",   w:1.0, l:2.0, ov:200},
  m60:   {t:"φ6mm　1m×2m",     w:1.0, l:2.0, ov:200},
  m60big:{t:"φ6mm　1.5m×3m",   w:1.5, l:3.0, ov:225},
};
// 鉄筋の規格（径・定尺）
const REBAR_SPECS = {
  d10_4: {t:"D10mm × 4m", size:"D10", len:4},
  d10_5: {t:"D10mm × 5m", size:"D10", len:5},
  d13_4: {t:"D13mm × 4m", size:"D13", len:4},
  d13_5: {t:"D13mm × 5m", size:"D13", len:5},
  d16_5: {t:"D16mm × 5m", size:"D16", len:5},
};
// ラスの規格（シート寸法・重ね代mm）
// 重ね代0mmなら 平ラス=3枚/坪、ダブルラス=2枚/坪 に相当する寸法
// 1坪 = 3.30579 ㎡
const TSUBO = 3.30579;
const LATH_SPECS = {
  flat:   {t:"平ラス　610×1829mm",     w:0.610, l:1.829, ov:0},
  double: {t:"ダブルラス　965×1870mm", w:0.965, l:1.870, ov:0},
};
function renderRebar(){
  $("#main").innerHTML = `<section class="card">
    <h2>メッシュ・鉄筋・ラス</h2>
    ${select("r_mode","種類",[
      {v:"mesh", t:"ワイヤーメッシュ"},
      {v:"rebar",t:"鉄筋（格子配筋）"},
      {v:"lath", t:"ラス（平ラス・ダブルラス）"},
    ],"mesh")}
    <div id="r_body"></div>
  </section>`;
  const mode = () => $("#r_mode").value;
  const bodies = {
    rebar: () => `
      ${select("rb_spec","鉄筋の規格",Object.keys(REBAR_SPECS).map(k=>({v:k,t:REBAR_SPECS[k].t})),"d10_4")}
      <div class="grid2">${field("rb_w","幅","m","5")}${field("rb_h","高さ／長さ","m","3")}</div>
      ${field("rb_p","配筋ピッチ","mm",null,"200")}
      <label class="check"><input type="checkbox" id="rb_both"><span class="field-label">ダブル配筋（両面）</span></label>
      ${loss("rb_loss","0")}<div id="rb_out"></div>`,
    mesh: () => `
      ${select("rm_spec","メッシュの規格",Object.keys(MESH_SPECS).map(k=>({v:k,t:MESH_SPECS[k].t})),"m60")}
      ${select("rm_imode","入力方法",[
        {v:"dim",  t:"寸法で入力（縦×横）※正確"},
        {v:"area", t:"面積で入力（㎡）※概算"},
      ],"dim")}
      <div id="rm_in"></div>
      <div class="grid2">${field("rm_ov","重ね代（縦横とも）","mm",null,"200")}${loss("rm_loss","0")}</div>
      <div id="rm_out"></div>`,
    lath: () => `
      ${select("rl_spec","ラスの種類",Object.keys(LATH_SPECS).map(k=>({v:k,t:LATH_SPECS[k].t})),"flat")}
      ${select("rl_imode","入力方法",[
        {v:"dim",  t:"寸法で入力（縦×横）※正確"},
        {v:"area", t:"面積で入力（㎡）※概算"},
      ],"dim")}
      <div id="rl_in"></div>
      <div class="grid2">${field("rl_ov","重ね代（縦横とも）","mm",null,"0")}${loss("rl_loss","0")}</div>
      <div id="rl_out"></div>`,
  };
  const calcs = {
    rebar: () => {
      const spec=REBAR_SPECS[$("#rb_spec").value];
      const size=spec.size, barLen=spec.len;
      const W=num("rb_w"), H=num("rb_h"), p=num("rb_p")/1000, l=num("rb_loss")/100;
      const both=$("#rb_both").checked;
      let barsH=0, barsV=0, coreLen=0;
      if(p>0){
        barsH=Math.floor(H/p)+1; barsV=Math.floor(W/p)+1;
        coreLen=(barsH*W + barsV*H)*(both?2:1); // ロス前の実長
      }
      const totalLen=coreLen*(1+l);
      // 定尺本数：総長さ ÷ 1本の定尺長さ（端材ロス込み）を切り上げ
      const barsToBuy=barLen>0 ? ceilN(totalLen/barLen) : 0;
      $("#rb_out").innerHTML = resultBox([
        {label:"必要本数（定尺）", value:fmt(barsToBuy,0), unit:`本(${barLen}m)`},
        {label:"総長さ", value:fmt(totalLen,1), unit:"m"},
        {label:"概算重量", value:fmt(totalLen*(WEIGHT[size]||0),1), unit:"kg"},
        {label:"横筋 / 縦筋 配置", value:`${fmt(barsH,0)} / ${fmt(barsV,0)}`, unit:"本"},
      ], `必要本数は「総長さ÷定尺${barLen}m」を切り上げた概算です。実際は1本の途中で切り継ぐため端材が出ます。定着・重ね継手長さは別途加算してください。ロス${fmt(num("rb_loss"),0)}%込み。`)
        + rebarDiagram(barsH, barsV);
    },
    mesh: () => {
      const spec=MESH_SPECS[$("#rm_spec").value];
      const imode=$("#rm_imode").value;
      const ovM=num("rm_ov")/1000, l=num("rm_loss")/100;
      const inWrap=$("#rm_in");
      if(inWrap && inWrap.dataset.mode!==imode){
        inWrap.dataset.mode=imode;
        inWrap.innerHTML = imode==="dim"
          ? `<div class="grid2">${field("rm_W","施工幅（横）","m","5",null,"0.1")}${field("rm_L","施工長さ（縦）","m","10",null,"0.1")}</div>`
          : field("rm_area","施工面積","m²","50",null,"0.1");
        bindInputs("#rm_in", calcs.mesh);
      }
      const effW=Math.max(spec.w-ovM,0), effL=Math.max(spec.l-ovM,0);
      const sa=effW*effL;
      let area, W=0, L=0, cols_=0, rows_=0, exCols=0, exRows=0, exact=0, note="";
      if(imode==="dim"){
        W=num("rm_W"); L=num("rm_L"); area=W*L;
        cols_=sheetsAlong(W, spec.w, ovM);   // 割付（切上）＝並べる枚数
        rows_=sheetsAlong(L, spec.l, ovM);
        exCols=exactAlong(W, spec.w, ovM);   // 端を切れ端で調整した実数
        exRows=exactAlong(L, spec.l, ovM);
        exact = exCols*exRows*(1+l);
        note = `割付は横${fmt(cols_,0)}枚 × 縦${fmt(rows_,0)}枚（＝${fmt(cols_*rows_,0)}枚）ですが、端の半端な列・段は1枚まるごと使わず切って納めます。`
          + `その端材は他の半端な箇所へ回すため、実数で「横${fmt(exCols,2)} × 縦${fmt(exRows,2)} ＝ ${fmt(exact,2)}枚」として拾い、切り上げています。`
          + `端（外周）には重ね代を取りません。重ね代${fmt(num("rm_ov"),0)}mmは縦・横それぞれの寸法から差し引いています。`;
      } else {
        area=num("rm_area");
        exact = sa>0 ? (area/sa)*(1+l) : 0;
        note = `面積のみの概算です（施工面積 ${fmt(area,2)}㎡ ÷ 1枚の有効面積 ${fmt(sa,2)}㎡）。`
          + `正確に拾うには「寸法で入力」をお使いください。`;
      }
      const count=ceilN(exact);
      const rowsArr=[
        {label:"必要枚数", value:fmt(count,0), unit:"枚"},
        {label:"シート寸法", value:`${fmt(spec.w,2)}×${fmt(spec.l,2)}m ＝ ${fmt(spec.w*spec.l,2)}㎡`, unit:""},
        {label:"有効寸法（重ね代引後）", value:`${fmt(effW,2)}×${fmt(effL,2)}m ＝ ${fmt(sa,2)}㎡`, unit:""},
        {label:"施工面積", value:fmt(area,2), unit:"m²"},
      ];
      if(imode==="dim"){
        rowsArr.push({label:"割付（並べ方）", value:`横${fmt(cols_,0)}枚 × 縦${fmt(rows_,0)}枚`, unit:""});
        rowsArr.push({label:"　└ 端材調整後", value:`${fmt(exact,2)} → ${fmt(count,0)}枚`, unit:""});
      }
      $("#rm_out").innerHTML = resultBox(rowsArr, note)
        + (imode==="dim"
            ? layoutDiagram(W, L, spec.w, spec.l, ovM, cols_, rows_)
            : sheetDiagram(effW, effL, count, "枚"));
    },
    lath: () => {
      const spec=LATH_SPECS[$("#rl_spec").value];
      const imode=$("#rl_imode").value;
      const ovM=num("rl_ov")/1000, l=num("rl_loss")/100;
      const inWrap=$("#rl_in");
      if(inWrap && inWrap.dataset.mode!==imode){
        inWrap.dataset.mode=imode;
        inWrap.innerHTML = imode==="dim"
          ? `<div class="grid2">${field("rl_W","施工幅（横）","m","3",null,"0.1")}${field("rl_L","施工長さ（縦）","m","10",null,"0.1")}</div>`
          : field("rl_area","施工面積","m²","30",null,"0.1");
        bindInputs("#rl_in", calcs.lath);
      }
      const effW=Math.max(spec.w-ovM,0), effL=Math.max(spec.l-ovM,0);
      const sa=effW*effL;
      let area, W=0, L=0, cols_=0, rows_=0, exCols=0, exRows=0, exact=0, note="";
      if(imode==="dim"){
        W=num("rl_W"); L=num("rl_L"); area=W*L;
        cols_=sheetsAlong(W, spec.w, ovM);
        rows_=sheetsAlong(L, spec.l, ovM);
        exCols=exactAlong(W, spec.w, ovM);
        exRows=exactAlong(L, spec.l, ovM);
        exact = exCols*exRows*(1+l);
        note = `割付は横${fmt(cols_,0)}枚 × 縦${fmt(rows_,0)}枚（＝${fmt(cols_*rows_,0)}枚）ですが、端の半端な列・段は1枚まるごと使わず切って納めます。`
          + `その端材は他の半端な箇所へ回すため、実数で「横${fmt(exCols,2)} × 縦${fmt(exRows,2)} ＝ ${fmt(exact,2)}枚」として拾い、切り上げています。`
          + `重ね代0mmなら平ラス約3枚/坪、ダブルラス約2枚/坪。ステープル・力骨は別途。`;
      } else {
        area=num("rl_area");
        exact = sa>0 ? (area/sa)*(1+l) : 0;
        note = `面積のみの概算です（施工面積 ${fmt(area,2)}㎡ ÷ 1枚の有効面積 ${fmt(sa,3)}㎡）。`
          + `正確に拾うには「寸法で入力」をお使いください。ステープル・力骨は別途。`;
      }
      const count=ceilN(exact);
      const perTsubo = sa>0 ? TSUBO/sa : 0;
      const rowsArr=[
        {label:"必要枚数", value:fmt(count,0), unit:"枚"},
        {label:"1枚の寸法", value:`${fmt(spec.w*1000,0)}×${fmt(spec.l*1000,0)}mm ＝ ${fmt(spec.w*spec.l,3)}㎡`, unit:""},
        {label:"有効寸法（重ね代引後）", value:`${fmt(effW*1000,0)}×${fmt(effL*1000,0)}mm ＝ ${fmt(sa,3)}㎡`, unit:""},
        {label:"施工面積", value:`${fmt(area,2)}㎡ ／ ${fmt(area/TSUBO,2)}坪`, unit:""},
        {label:"1坪あたり", value:fmt(perTsubo,2), unit:"枚/坪"},
      ];
      if(imode==="dim"){
        rowsArr.push({label:"割付（並べ方）", value:`横${fmt(cols_,0)}枚 × 縦${fmt(rows_,0)}枚`, unit:""});
        rowsArr.push({label:"　└ 端材調整後", value:`${fmt(exact,2)} → ${fmt(count,0)}枚`, unit:""});
      }
      $("#rl_out").innerHTML = resultBox(rowsArr, note)
        + (imode==="dim"
            ? layoutDiagram(W, L, spec.w, spec.l, ovM, cols_, rows_)
            : sheetDiagram(effW, effL, count, "枚"));
    },
  };
  const swap = () => {
    const m=mode(); $("#r_body").innerHTML=bodies[m](); bindInputs("#r_body",calcs[m]);
    // メッシュは規格を変えたら重ね代の目安も切り替える
    if(m==="mesh"){
      const sp=$("#rm_spec"), ov=$("#rm_ov");
      if(sp && ov){
        ov.value = MESH_SPECS[sp.value].ov;
        sp.addEventListener("change", ()=>{ ov.value = MESH_SPECS[sp.value].ov; calcs.mesh(); });
      }
    }
    calcs[m]();
  };
  $("#r_mode").addEventListener("change", swap); swap();
}

/* =====================================================================
   入力バインド & タブ制御
===================================================================== */
function bindInputs(scope, cb){
  document.querySelectorAll(scope+" input, "+scope+" select").forEach(el=>{
    el.addEventListener("input", cb);
    el.addEventListener("change", cb);
  });
}

const TABS = [
  {id:"block",   label:"コンクリートブロック", render:renderBlock},
  {id:"rebar",   label:"メッシュ・鉄筋・ラス", render:renderRebar},
  {id:"plaster", label:"左官材",               render:renderPlaster},
  {id:"mix",     label:"生コン・モルタル",     render:renderMix},
];
function buildTabs(){
  $("#tabs").innerHTML = TABS.map(t=>`<button data-id="${t.id}">${t.label}</button>`).join("");
  $("#tabs").querySelectorAll("button").forEach(btn=>{
    btn.addEventListener("click", ()=>activate(btn.dataset.id));
  });
}
function activate(id){
  $("#tabs").querySelectorAll("button").forEach(b=>b.classList.toggle("active", b.dataset.id===id));
  TABS.find(t=>t.id===id).render();
  CURRENT = id;
}

/* ---- 印刷 ---- */
let CURRENT = "block";
function setPrintFoot(){
  const t = TABS.find(x=>x.id===CURRENT);
  const d = new Date();
  const ymd = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  $("#printFoot").innerHTML =
    `<span>${t ? t.label : ""}　計算結果</span><span>出力日：${ymd}</span>`;
}
/* ---- 印刷プレビュー ----
   iOSのSafariは window.print() を実行できないため、
   まず画面上にA4の紙を再現したプレビューを出す。
   そこから「共有 → プリント」すれば、見たままが印刷される。 */
function isIOS(){
  const ua = navigator.userAgent || "";
  return /iPad|iPhone|iPod/.test(ua) ||
         (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1);  // iPadOS対策
}

function buildPreview(){
  const t = TABS.find(x=>x.id===CURRENT);
  const d = new Date();
  const ymd = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;

  // いま表示中のカードを複製（入力値も引き継ぐ）
  const card = $("#main").querySelector(".card");
  const clone = card ? card.cloneNode(true) : document.createElement("div");
  // 複製した入力欄に現在値を焼き付ける（cloneNodeはvalueを引き継がないため）
  const src = card ? card.querySelectorAll("input, select") : [];
  const dst = clone.querySelectorAll("input, select");
  src.forEach((el,i)=>{
    const to = dst[i]; if(!to) return;
    if(el.type==="checkbox"){ to.checked = el.checked; if(el.checked) to.setAttribute("checked",""); else to.removeAttribute("checked"); }
    else if(to.tagName==="SELECT"){ to.value = el.value;
      [...to.options].forEach(o=>{ if(o.value===el.value) o.setAttribute("selected",""); else o.removeAttribute("selected"); }); }
    else { to.value = el.value; to.setAttribute("value", el.value); }
    to.setAttribute("readonly","");            // プレビュー上では編集不可に
  });

  const paper = $("#pvPaper");
  paper.innerHTML = `
    <div class="pv-head">
      <div class="pv-logo">calc</div>
      <div>
        <div class="pv-h1">建材かんたん計算</div>
        <div class="pv-h2">面積・厚み・寸法から必要数量の目安を出します</div>
      </div>
    </div>
    <div class="disclaimer">
      <p><b>⚠ 数量はあくまで目安です。</b>発注・施工前に必ずメーカーの施工要領書をご確認ください。</p>
    </div>
  `;
  paper.appendChild(clone);
  const foot = document.createElement("div");
  foot.className = "pv-foot";
  foot.innerHTML = `<span>${t?t.label:""}　計算結果</span><span>出力日：${ymd}</span>`;
  paper.appendChild(foot);

  // 案内文（環境で出し分け）
  const tip = $("#pvTip");
  tip.style.background = ""; tip.style.color = ""; tip.style.fontWeight = "";
  tip.innerHTML = isIOS()
    ? "印刷するには、上の<b>「PDFで保存」</b>でPDFにして、Canon PRINT などのアプリで開いて印刷してください。Safariの<b>共有 → 「プリント」</b>（AirPrint）でもそのまま印刷できます。"
    : "<b>「印刷」</b>でそのままプリンターに送れます（用紙A4縦・<b>背景のグラフィックをオン</b>で色が印刷されます）。<b>「PDFで保存」</b>でA4のPDFにも書き出せます。";

  // 画面が狭い場合は紙全体が見えるよう縮小
  fitPaper();
}

function fitPaper(){
  const paper = $("#pvPaper"), fit = $("#pvFit"), sc = $(".pv-scroll");
  if(!paper || !fit || !sc) return;
  // 広い画面では等倍表示
  if(window.innerWidth > 840){
    paper.style.removeProperty("--pv-sc");
    fit.style.width = ""; fit.style.height = "";
    return;
  }
  // プレビューがまだ表示されていない（幅が測れない）ときは、表示後に再計算する
  const avail = sc.clientWidth - 16;
  if(avail <= 0){ requestAnimationFrame(fitPaper); return; }
  const pw = paper.offsetWidth || 794;    // 210mm ≒ 794px
  const ph = paper.offsetHeight || 1123;  // 297mm ≒ 1123px
  const ratio = Math.min(1, avail / pw);
  paper.style.setProperty("--pv-sc", ratio.toFixed(3));
  // 縮小後の実寸にラッパーを合わせ、余白（灰色部分）の崩れを防ぐ
  fit.style.width = Math.round(pw * ratio) + "px";
  fit.style.height = Math.ceil(ph * ratio) + "px";
}

$("#printBtn").addEventListener("click", ()=>{
  setPrintFoot();
  // 先にプレビューを表示してから紙を組み立てる
  // （表示前だと画面幅が0と誤検出され、縮小率がマイナスになって紙が消えるため）
  $("#pvMask").classList.add("show");
  document.body.classList.add("pv-open");
  document.body.style.overflow = "hidden";
  buildPreview();
});
$("#pvClose").addEventListener("click", ()=>{
  $("#pvMask").classList.remove("show");
  document.body.classList.remove("pv-open");
  document.body.style.overflow = "";
});
$("#pvPrint").addEventListener("click", ()=>{
  if(isIOS()){
    showTip("iPhone / iPad では、上の<b>「PDFで保存」</b>で保存したPDFをCanon PRINT などのアプリで開いて印刷してください。Safariの<b>共有 → 「プリント」</b>（AirPrint）でもそのまま印刷できます。", true);
    return;
  }
  window.print();
});

/* ---- 案内文の表示（操作後のメッセージ差し替え） ---- */
function showTip(msg, warn){
  const tip = $("#pvTip");
  if(!tip) return;
  tip.innerHTML = msg;
  tip.style.background = warn ? "#ffe0b8" : "#e3f3e3";
  tip.style.color = warn ? "#8a5a1a" : "#2e6b2e";
  tip.style.fontWeight = "700";
}

/* PDFライブラリは、ページ表示を妨げないよう「ボタンを押した時」に読み込む
   （ページ先頭で外部スクリプトを読み込むと、通信環境によっては本体スクリプト
   の実行が止まり、タブや計算欄が表示されなくなるため） */
function loadScript(src){
  return new Promise((resolve, reject)=>{
    const s = document.createElement("script");
    s.src = src; s.async = true;
    s.onload = ()=>resolve();
    s.onerror = ()=>reject(new Error("load failed: " + src));
    document.head.appendChild(s);
  });
}
let pdfLibsPromise = null;
function ensurePdfLibs(){
  if(window.html2canvas && window.jspdf && window.jspdf.jsPDF) return Promise.resolve();
  if(!pdfLibsPromise){
    pdfLibsPromise = Promise.all([
      window.html2canvas ? null : loadScript("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"),
      (window.jspdf && window.jspdf.jsPDF) ? null : loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"),
    ]).catch(e=>{ pdfLibsPromise = null; throw e; });
  }
  return pdfLibsPromise;
}

/* ---- PDFとして保存 ----
   Canon PRINT 等のアプリはページを読み込み直すため、プレビュー状態が消え
   元の操作画面が印刷されてしまう。そこでプレビューをA4のPDFに書き出し、
   そのPDFをアプリで開いて印刷してもらうことで「見たまま」を確実に印刷する。 */
$("#pvPdf").addEventListener("click", async ()=>{
  const btn = $("#pvPdf"), paper = $("#pvPaper");
  const label = btn.textContent;
  btn.textContent = "準備中…"; btn.disabled = true;
  let holder = null;
  try{
    await ensurePdfLibs();
    if(!window.html2canvas || !(window.jspdf && window.jspdf.jsPDF)){
      throw new Error("PDF libraries unavailable");
    }
    btn.textContent = "作成中…";
    // A4実寸のまま複製し、画面上の縮小の影響を受けずに描画する
    holder = document.createElement("div");
    holder.style.cssText = "position:fixed; left:-10000px; top:0; background:#fff;";
    const clone = paper.cloneNode(true);
    clone.style.transform = "none";
    clone.style.removeProperty("--pv-sc");
    holder.appendChild(clone);
    document.body.appendChild(holder);

    const canvas = await html2canvas(clone, {scale:2, backgroundColor:"#ffffff", useCORS:true, logging:false});
    const img = canvas.toDataURL("image/jpeg", 0.92);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
    const pw = 210, ph = 297;
    const ratio = Math.min(pw / canvas.width, ph / canvas.height);
    const w = canvas.width * ratio, h = canvas.height * ratio;
    pdf.addImage(img, "JPEG", (pw - w) / 2, 0, w, h);

    const t = TABS.find(x=>x.id===CURRENT);
    const d = new Date();
    const p2 = (n)=>String(n).padStart(2,"0");
    const ymd = `${d.getFullYear()}${p2(d.getMonth()+1)}${p2(d.getDate())}`;
    pdf.save(`建材かんたん計算_${t ? t.label : "計算結果"}_${ymd}.pdf`);
    showTip("PDFを保存しました。Canon PRINT などのアプリで開くと、見たまま印刷できます。", false);
  }catch(e){
    console.error(e);
    showTip("PDFの作成に失敗しました。インターネットに接続しているかご確認のうえ、少し時間をおいて再度お試しください。", true);
  }finally{
    if(holder && holder.parentNode) holder.parentNode.removeChild(holder);
    btn.textContent = label; btn.disabled = false;
  }
});
window.addEventListener("resize", ()=>{ if($("#pvMask").classList.contains("show")) fitPaper(); });
window.addEventListener("beforeprint", setPrintFoot);

buildTabs();
activate("block");
</script>
</body>
